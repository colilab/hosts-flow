name: Release

# Stable releases only. Pre-release tags (1.0.0-develop.0, -rc.1, -fix.0) never
# match this pattern, so develop/quality builds are never surfaced as updates.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # The dev creates the release as a DRAFT with Scripts/publish.sh (DMG +
  # appcast-entry.json attached) before pushing the tag. This job just flips
  # the draft to a published release.
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest

  # Append the new version to the Sparkle appcast served from gh-pages.
  update-appcast:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout appcast sources (main)
        uses: actions/checkout@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Fetch release assets and notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/rel
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern appcast-entry.json \
            --dir /tmp/rel
          gh release view "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --json body --jq .body > /tmp/rel/notes.md
          pandoc /tmp/rel/notes.md -f gfm -t html -o /tmp/rel/notes.html || : > /tmp/rel/notes.html

      - name: Append appcast item
        run: |
          python3 .github/scripts/append_appcast.py \
            /tmp/rel/appcast-entry.json \
            pages/appcast.xml \
            "${{ github.ref_name }}" \
            "${{ github.repository }}" \
            /tmp/rel/notes.html

      - name: Commit & push gh-pages
        working-directory: pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "appcast: Host Flow ${{ github.ref_name }}"
          git push

  # Bump the Homebrew cask in colilab/homebrew-tap so `brew upgrade` (and new
  # `brew install --cask colilab/tap/hostflow` runs) pick up the just-published
  # DMG. Needs TAP_REPO_TOKEN — a fine-grained PAT with Contents:write on
  # colilab/homebrew-tap.
  update-cask:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: colilab/homebrew-tap
          token: ${{ secrets.TAP_REPO_TOKEN }}
          path: tap

      - name: Compute DMG sha256
        id: dmg
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          url="https://github.com/${{ github.repository }}/releases/download/${VERSION}/HostFlow-${VERSION}.dmg"
          curl -fsSL -o /tmp/HostFlow.dmg "$url"
          sha=$(sha256sum /tmp/HostFlow.dmg | cut -d' ' -f1)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Update cask version + sha256
        working-directory: tap
        env:
          VERSION: ${{ github.ref_name }}
          SHA: ${{ steps.dmg.outputs.sha }}
        run: |
          sed -i -E "s/^(  version )\"[^\"]+\"$/\\1\"${VERSION}\"/" Casks/hostflow.rb
          sed -i -E "s/^(  sha256 )\"[^\"]+\"$/\\1\"${SHA}\"/" Casks/hostflow.rb
          # Fail loudly if the placeholders were not where we expected them.
          grep -q "version \"${VERSION}\"" Casks/hostflow.rb
          grep -q "sha256 \"${SHA}\"" Casks/hostflow.rb

      - name: Commit & push tap
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/hostflow.rb
          if git diff --cached --quiet; then
            echo "cask unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "chore: bump hostflow to ${{ github.ref_name }}"
          git push
