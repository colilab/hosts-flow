name: HostFlow
options:
  bundleIdPrefix: com.colilab
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: HostFlow
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  HostFlow:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Stores
      - path: Views
      - path: Helpers
      - path: Shared
    resources:
      - path: Resources/Assets.xcassets
    postBuildScripts:
      - name: Embed helper plist
        script: |
          set -e
          DEST="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Library/LaunchDaemons"
          mkdir -p "$DEST"
          cp "${SRCROOT}/Helper/Resources/com.colilab.hostflow.helper.plist" "$DEST/"
        inputFiles:
          - $(SRCROOT)/Helper/Resources/com.colilab.hostflow.helper.plist
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(PRODUCT_NAME).app/Contents/Library/LaunchDaemons/com.colilab.hostflow.helper.plist
    dependencies:
      - target: HostFlowHelper
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Library/LaunchDaemons
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colilab.hostflow
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/HostFlow.entitlements
    entitlements:
      path: Resources/HostFlow.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.temporary-exception.files.absolute-path.read-write:
          - /etc/hosts

  HostFlowHelper:
    type: tool
    platform: macOS
    sources:
      - path: Helper
        excludes:
          - Resources/**
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colilab.hostflow.helper
        PRODUCT_NAME: com.colilab.hostflow.helper
        SKIP_INSTALL: NO
